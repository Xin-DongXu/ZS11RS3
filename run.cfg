[General]
job_type = local
job_prefix = ZS11
task = all
rewrite = yes
deltmp = yes
parallel_jobs = 6
input_type = raw
read_type = ont
input_fofn = input.fofn
workdir = zs11_asm

[correct_option]
read_cutoff = 20k
genome_size = 1.2g
sort_options = -m 40g -t 12
minimap2_options_raw = -t 12
pa_correction = 5
correction_options = -p 12

[assemble_option]
minimap2_options_cns = -t 12
nextgraph_options = -a 1